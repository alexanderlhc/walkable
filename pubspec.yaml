name: walkable
description: Track your walks. All data stays on your phone.
publish_to: none
version: 0.2.2+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.0
  flutter_map: ^8.0.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true

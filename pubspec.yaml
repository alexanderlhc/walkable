name: walkable
description: Track your walks. All data stays on your phone.
publish_to: none
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.9.0
  geolocator: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true

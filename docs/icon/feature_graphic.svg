<?xml version="1.0" encoding="UTF-8"?>
<!-- Google Play feature graphic, 1024x500. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ECFBEF"/>
      <stop offset="1" stop-color="#A6E1B6"/>
    </linearGradient>
    <linearGradient id="fig" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#2EB85A"/>
      <stop offset="1" stop-color="#0E9A47"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- subtle walked "route": a dashed curve with a few waypoints -->
  <g stroke="#179A4D" stroke-opacity="0.22" fill="none" stroke-width="6"
     stroke-linecap="round" stroke-dasharray="2 26">
    <path d="M40 430 C 220 360, 300 470, 470 400 S 760 300, 1000 360"/>
  </g>
  <g fill="#179A4D" fill-opacity="0.22">
    <circle cx="40"  cy="430" r="9"/>
    <circle cx="470" cy="400" r="9"/>
    <circle cx="1000" cy="360" r="9"/>
  </g>

  <!-- walking figure (Material directions_walk, Apache-2.0) -->
  <g transform="translate(40,64) scale(15)" fill="url(#fig)">
    <path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7"/>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="Noto Sans, Liberation Sans, sans-serif">
    <text x="392" y="232" font-size="104" font-weight="700" fill="#0C7A39"
          letter-spacing="-2">Walkable</text>
    <text x="396" y="300" font-size="34" font-weight="600" fill="#1F7A48">Track your walks.</text>
    <text x="396" y="346" font-size="34" font-weight="400" fill="#3A6B52">All data stays on your phone.</text>
  </g>
</svg>
